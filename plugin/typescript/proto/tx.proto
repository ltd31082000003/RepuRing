syntax = "proto3";
package types;
option go_package = "github.com/canopy-network/go-plugin/contract";

import "google/protobuf/any.proto";

message Transaction {
  string message_type = 1; // @gotags: json:"messageType"
  google.protobuf.Any msg = 2;
  Signature signature = 3;
  uint64 created_height = 4; // @gotags: json:"createdHeight"
  uint64 time = 5;
  uint64 fee = 6;
  string memo = 7;
  uint64 network_id = 8; // @gotags: json:"networkID"
  uint64 chain_id = 9; // @gotags: json:"chainID"
}

message MessageCreateProfile {
  bytes sender_address = 1; // @gotags: json:"senderAddress"
  string username = 2;
  string bio = 3;
  string avatar_url = 4; // @gotags: json:"avatarUrl"
}

message MessageCreateCircle {
  bytes sender_address = 1; // @gotags: json:"senderAddress"
  string circle_id = 2; // @gotags: json:"circleId"
  string name = 3;
  string description = 4;
}

message MessageJoinCircle {
  bytes sender_address = 1; // @gotags: json:"senderAddress"
  string circle_id = 2; // @gotags: json:"circleId"
}

message MessageEndorseUser {
  bytes sender_address = 1; // @gotags: json:"senderAddress"
  string circle_id = 2; // @gotags: json:"circleId"
  bytes target_address = 3; // @gotags: json:"targetAddress"
  string tag = 4;
  string message = 5;
}

message MessageCreateContribution {
  bytes sender_address = 1; // @gotags: json:"senderAddress"
  string contribution_id = 2; // @gotags: json:"contributionId"
  string circle_id = 3; // @gotags: json:"circleId"
  string title = 4;
  string description = 5;
  string proof_url = 6; // @gotags: json:"proofUrl"
  string category = 7;
}

message MessageEndorseContribution {
  bytes sender_address = 1; // @gotags: json:"senderAddress"
  string contribution_id = 2; // @gotags: json:"contributionId"
  string tag = 3;
  string message = 4;
}

message MessageSlashEndorsement {
  bytes sender_address = 1; // @gotags: json:"senderAddress"
  string endorsement_id = 2; // @gotags: json:"endorsementId"
  string reason = 3;
}

message MessageClaimRole {
  bytes sender_address = 1; // @gotags: json:"senderAddress"
  string circle_id = 2; // @gotags: json:"circleId"
}

message Profile {
  bytes address = 1;
  string username = 2;
  string bio = 3;
  string avatar_url = 4; // @gotags: json:"avatarUrl"
  uint64 reputation = 5;
}

message Circle {
  string circle_id = 1; // @gotags: json:"circleId"
  string name = 2;
  string description = 3;
  bytes creator_address = 4; // @gotags: json:"creatorAddress"
  repeated bytes members = 5;
}

message Endorsement {
  string endorsement_id = 1; // @gotags: json:"endorsementId"
  string circle_id = 2; // @gotags: json:"circleId"
  bytes from_address = 3; // @gotags: json:"fromAddress"
  bytes target_address = 4; // @gotags: json:"targetAddress"
  string tag = 5;
  string message = 6;
  bool slashed = 7;
  string slash_reason = 8; // @gotags: json:"slashReason"
  string contribution_id = 9; // @gotags: json:"contributionId"
}

message Contribution {
  string contribution_id = 1; // @gotags: json:"contributionId"
  string circle_id = 2; // @gotags: json:"circleId"
  bytes author_address = 3; // @gotags: json:"authorAddress"
  string title = 4;
  string description = 5;
  string proof_url = 6; // @gotags: json:"proofUrl"
  string category = 7;
  uint64 endorsement_count = 8; // @gotags: json:"endorsementCount"
  bool slashed = 9;
}

message Role {
  string circle_id = 1; // @gotags: json:"circleId"
  bytes address = 2;
  string role = 3;
  uint64 reputation = 4;
}

message FeeParams {
  uint64 send_fee = 1; // @gotags: json:"sendFee"
}

message Signature {
  bytes public_key = 1; // @gotags: json:"publicKey"
  bytes signature = 2;
}
